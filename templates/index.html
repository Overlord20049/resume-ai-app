<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Matcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            color: white;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: #2f2f4f;
            padding: 30px;
            border-radius: 15px;
            width: 500px;
            margin: auto;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 20px;
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        textarea {
            height: 120px;
        }

        button {
            background: #00c9a7;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00a88a;
        }

        .result {
            margin-top: 20px;
            background: #1e1e2f;
            padding: 15px;
            border-radius: 10px;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
        }

        ul {
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 AI Resume Matcher</h1>

        <form method="POST" enctype="multipart/form-data">
            <p>Upload Resume (PDF)</p>
            <input type="file" name="resume" required>

            <p>Paste Job Description</p>
            <textarea name="job_desc" required></textarea>

            <br>
            <button type="submit">Check Match</button>
        </form>

        {% if score %}
        <div class="result">
            <p class="score">Match Score: {{ score }}%</p>

            <h3>✅ Skills Found</h3>
            <ul>
                {% for skill in found %}
                <li>{{ skill }}</li>
                {% endfor %}
            </ul>

            <h3>❌ Missing Skills</h3>
            <ul>
                {% for skill in missing %}
                <li>{{ skill }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</body>
</html>
