<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Matcher</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
            color: white;
        }

        .container {
            width: 50%;
            margin: 50px auto;
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        input, textarea {
            width: 100%;
            margin-top: 10px;
            margin-bottom: 20px;
            padding: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5ff;
        }

        .skills span {
            background: #2a5298;
            color: white;
            padding: 5px 10px;
            margin: 5px;
            display: inline-block;
            border-radius: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚀 AI Resume Matcher</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="resume" required>

        <textarea name="job_description" placeholder="Paste Job Description" required></textarea>

        <button type="submit">Check Match</button>
    </form>

    {% if score %}
    <div class="result">
        <h2>Match Score: {{ score }}%</h2>

        <div class="skills">
            {% for skill in skills %}
                <span>{{ skill }}</span>
            {% endfor %}
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
