<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Matcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 45%;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2a5298;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input[type="file"],
        textarea {
            width: 100%;
            margin-top: 10px;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            height: 150px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f4f7ff;
            border-left: 5px solid #2a5298;
            border-radius: 10px;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #2a5298;
        }

        .skills {
            margin-top: 10px;
        }

        .skills span {
            display: inline-block;
            background: #2a5298;
            color: white;
            padding: 6px 12px;
            margin: 5px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AI Resume Matcher</h1>

    <form method="POST" enctype="multipart/form-data">
        <label>Upload Resume (PDF):</label>
        <input type="file" name="resume" required>

        <label>Paste Job Description:</label>
        <textarea name="job_description" placeholder="Paste job description here..." required></textarea>

        <button type="submit">Check Match</button>
    </form>

    {% if score %}
    <div class="result">
        <div class="score">Match Score: {{ score }}%</div>

        <div class="skills">
            <strong>Top Keywords:</strong><br>
            {% for skill in skills %}
                <span>{{ skill }}</span>
            {% endfor %}
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
